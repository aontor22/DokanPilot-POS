services:
  db:
    image: postgres:16-alpine
    container_name: dokandesk-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dokandesk
      POSTGRES_USER: dokandesk
      POSTGRES_PASSWORD: dokandesk_dev_password
    ports:
      - "5432:5432"
    volumes:
      - dokandesk_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dokandesk -d dokandesk"]
      interval: 5s
      timeout: 5s
      retries: 15

volumes:
  dokandesk_postgres_data:
